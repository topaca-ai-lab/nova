name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before you start:** Read [CONTRIBUTING.md](https://github.com/topaca-ai-lab/nova/blob/main/CONTRIBUTING.md).

        Keep this short, technical, and reproducible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Be specific. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: e.g. 0.69.0
    validations:
      required: false
